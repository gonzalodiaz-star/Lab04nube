<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurante Sabor de Casa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero__content">
          <p class="eyebrow">API + Docker + MySQL</p>
          <h1>Sabor de Casa</h1>
          <p class="hero__text">
            Panel de demostracion para clientes y platos del restaurante.
          </p>
        </div>
        <div class="hero__card">
          <h2>Estado del sistema</h2>
          <p id="status">Cargando informacion...</p>
        </div>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel__header">
            <p class="eyebrow">Clientes</p>
            <h2>Reservas activas</h2>
          </div>
          <div id="clientes" class="list"></div>
        </article>

        <article class="panel">
          <div class="panel__header">
            <p class="eyebrow">Menu</p>
            <h2>Platos destacados</h2>
          </div>
          <div id="platos" class="list"></div>
        </article>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
